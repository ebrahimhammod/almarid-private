<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- خلفية متدرجة -->
    <rect width="512" height="512" rx="128" fill="url(#gradFavicon)" />
    <defs>
        <linearGradient id="gradFavicon" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop stop-color="#8B5CF6"/>
            <stop offset="1" stop-color="#EC4899"/>
        </linearGradient>
    </defs>
    
    <!-- أيقونة العدسة/البحث (رمز الاستخراج) -->
    <circle cx="256" cy="256" r="120" stroke="white" stroke-width="20" fill="none" opacity="0.9"/>
    <line x1="340" y1="340" x2="420" y2="420" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
    
    <!-- حرف E كبير (Extractor) -->
    <path d="M180 180H300V230H230V280H300V330H180V180Z" fill="white" opacity="0.95"/>
    
    <!-- حرف O صغير (OCR) داخل العدسة -->
    <circle cx="340" cy="340" r="30" stroke="white" stroke-width="12" fill="none" opacity="0.8"/>
    
    <!-- نقطة تأثير -->
    <circle cx="400" cy="180" r="15" fill="white" opacity="0.6"/>
</svg>